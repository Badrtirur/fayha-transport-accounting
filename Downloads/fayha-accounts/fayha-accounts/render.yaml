databases:
  - name: fayha-db
    plan: free
    databaseName: fayha_accounts
    user: fayha_user

services:
  # ==========================================
  # BACKEND - Node.js API (Express + Prisma + PostgreSQL)
  # URL: https://fayha-backend.onrender.com
  # ==========================================
  - type: web
    name: fayha-backend
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: bash render-build.sh
    startCommand: sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma && npx prisma db push --accept-data-loss && node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fayha-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: CORS_ORIGIN
        value: https://fayha-accounts.pages.dev
