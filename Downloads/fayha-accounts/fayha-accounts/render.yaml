databases:
  - name: fayha-db
    plan: free
    databaseName: fayha_accounts
    user: fayha_user

services:
  - type: web
    name: fayha-backend
    plan: free
    runtime: node
    rootDir: Downloads/fayha-accounts/fayha-accounts/backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fayha-db
          property: connectionString
      - key: JWT_SECRET
        value: fayha-transport-jwt-secret-2026-production
      - key: JWT_REFRESH_SECRET
        value: fayha-transport-refresh-secret-2026
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: CORS_ORIGIN
        value: "*"

  - type: web
    name: fayha-frontend
    plan: free
    runtime: static
    rootDir: Downloads/fayha-accounts/fayha-accounts/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://fayha-backend.onrender.com/api/v1
